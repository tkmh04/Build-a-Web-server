<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Web Server</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: linear-gradient(135deg, #0066cc 0%, #0088ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .wrapper {
            width: 100%;
            max-width: 600px;
        }

        .container {
            background: white;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .welcome-header {
            margin-bottom: 40px;
        }

        .welcome-icon {
            font-size: 60px;
            margin-bottom: 20px;
            color: #0066cc;
        }

        h1 {
            color: #0066cc;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .username {
            color: #0088ff;
            font-size: 28px;
            font-weight: 600;
        }

        .subtitle {
            color: #666;
            font-size: 15px;
            margin-top: 10px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .info-card {
            background: linear-gradient(135deg, #f0f4ff 0%, #f8faff 100%);
            border-left: 4px solid #0066cc;
            padding: 20px;
            border-radius: 8px;
            text-align: left;
        }

        .info-card h3 {
            color: #0066cc;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .info-card p {
            color: #333;
            font-size: 16px;
            font-weight: 500;
            word-break: break-all;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 35px;
            justify-content: center;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0066cc 0%, #0088ff 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 102, 204, 0.3);
            flex: 1;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 102, 204, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #0066cc;
            border: 2px solid #0066cc;
            flex: 1;
        }

        .btn-secondary:hover {
            background: #f8f9fa;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ff5555;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 85, 85, 0.3);
        }

        .btn-danger:hover {
            background: #ff3333;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 85, 85, 0.4);
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 35px 25px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 26px;
            }

            .username {
                font-size: 22px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="success-message">
                ✓ Đã đăng nhập vào hệ thống
            </div>

            <div class="welcome-header">
                <div class="welcome-icon">🎉</div>
                <h1>Chào Mừng</h1>
                <div class="username" id="username"></div>
                <p class="subtitle">Bạn đã đăng nhập thành công vào Web Server</p>
            </div>

            <div class="info-grid">
                <div class="info-card">
                    <h3>👤 Tài Khoản</h3>
                    <p id="usernameInfo"></p>
                </div>
                <div class="info-card">
                    <h3>🕐 Thời Gian Đăng Nhập</h3>
                    <p id="loginTime"></p>
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" onclick="refreshPage()">🔄 Làm Mới</button>
                <button class="btn btn-danger" onclick="handleLogout()">🚪 Đăng Xuất</button>
            </div>
        </div>
    </div>

    <script>
        function checkLogin() {
            const currentUser = localStorage.getItem('currentUser');
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }
            
            document.getElementById('username').textContent = currentUser;
            document.getElementById('usernameInfo').textContent = currentUser;
            document.getElementById('loginTime').textContent = new Date().toLocaleString('vi-VN');
        }

        function handleLogout() {
            if (confirm('Bạn có chắc chắn muốn đăng xuất?')) {
                localStorage.removeItem('currentUser');
                window.location.href = 'index.html';
            }
        }

        function refreshPage() {
            location.reload();
        }

        window.onload = function() {
            checkLogin();
        }
    </script>
</body>
</html>
