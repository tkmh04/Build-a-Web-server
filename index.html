<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Server - Login & Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: linear-gradient(135deg, #0066cc 0%, #0088ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .wrapper {
            width: 100%;
            max-width: 420px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .container {
            background: white;
            padding: 40px 35px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header h2 {
            color: #0066cc;
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .form-header p {
            color: #666;
            font-size: 13px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0066cc;
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #0066cc 0%, #0088ff 100%);
            color: white;
            border: none;
            padding: 13px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 102, 204, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 102, 204, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toggle-section {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .toggle-section p {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .toggle-link {
            color: #0066cc;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .toggle-link:hover {
            color: #0052a3;
            text-decoration: underline;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            font-size: 14px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 26px;
            }

            .form-header h2 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <h1>🔐 Web Server</h1>
            <p>Cổng truy cập an toàn</p>
        </div>

        <div class="container">
            <!-- Biểu mẫu Đăng nhập -->
            <div id="loginForm" class="form active">
                <div class="form-header">
                    <h2>Đăng Nhập</h2>
                    <p>Chào mừng trở lại</p>
                </div>
                <div id="loginAlert" class="alert"></div>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginUsername">Tên đăng nhập</label>
                        <input type="text" id="loginUsername" placeholder="Nhập tên đăng nhập" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Mật khẩu</label>
                        <input type="password" id="loginPassword" placeholder="Nhập mật khẩu" required>
                    </div>
                    <button type="submit" class="btn">Đăng Nhập</button>
                    <div class="toggle-section">
                        <p>Chưa có tài khoản?</p>
                        <a class="toggle-link" onclick="switchForm()">Đăng ký tại đây</a>
                    </div>
                </form>
            </div>

            <!-- Biểu mẫu Đăng ký -->
            <div id="registerForm" class="form">
                <div class="form-header">
                    <h2>Đăng Ký</h2>
                    <p>Tạo tài khoản mới</p>
                </div>
                <div id="registerAlert" class="alert"></div>
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="registerUsername">Tên đăng nhập</label>
                        <input type="text" id="registerUsername" placeholder="Chọn tên đăng nhập" required>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Mật khẩu</label>
                        <input type="password" id="registerPassword" placeholder="Tạo mật khẩu" required>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword2">Xác nhận mật khẩu</label>
                        <input type="password" id="registerPassword2" placeholder="Nhập lại mật khẩu" required>
                    </div>
                    <button type="submit" class="btn">Đăng Ký</button>
                    <div class="toggle-section">
                        <p>Đã có tài khoản?</p>
                        <a class="toggle-link" onclick="switchForm()">Đăng nhập tại đây</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Khởi tạo database từ localStorage
        function initDatabase() {
            if (!localStorage.getItem('users')) {
                const defaultUsers = [
                    { username: 'user', password: 'pass' },
                    { username: 'admin', password: 'admin123' },
                    { username: 'test', password: 'test123' }
                ];
                localStorage.setItem('users', JSON.stringify(defaultUsers));
            }
        }

        // Chuyển đổi giữa các form
        function switchForm() {
            document.getElementById('loginForm').classList.toggle('active');
            document.getElementById('registerForm').classList.toggle('active');
            clearAlerts();
        }

        // Xóa thông báo
        function clearAlerts() {
            document.getElementById('loginAlert').innerHTML = '';
            document.getElementById('registerAlert').innerHTML = '';
        }

        // Hiển thị thông báo
        function showAlert(type, message) {
            const alertEl = type === 'login' ? document.getElementById('loginAlert') : document.getElementById('registerAlert');
            alertEl.innerHTML = message;
            alertEl.className = 'alert ' + (message.includes('thành công') || message.includes('Chào') ? 'success' : 'error');
        }

        // Xử lý Đăng nhập
        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            const users = JSON.parse(localStorage.getItem('users'));
            const user = users.find(u => u.username === username);

            if (user && user.password === password) {
                localStorage.setItem('currentUser', username);
                showAlert('login', '✓ Đăng nhập thành công! Đang chuyển hướng...');
                setTimeout(() => {
                    window.location.href = 'welcome.html';
                }, 1000);
            } else {
                showAlert('login', '✗ Tên đăng nhập hoặc mật khẩu không hợp lệ!');
            }
        }

        // Xử lý Đăng ký
        function handleRegister(event) {
            event.preventDefault();
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;
            const password2 = document.getElementById('registerPassword2').value;

            if (password !== password2) {
                showAlert('register', '✗ Mật khẩu không khớp!');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users'));
            if (users.find(u => u.username === username)) {
                showAlert('register', '✗ Tên đăng nhập đã tồn tại!');
                return;
            }

            users.push({ username, password });
            localStorage.setItem('users', JSON.stringify(users));
            showAlert('register', '✓ Đăng ký thành công! Chuyển sang đăng nhập...');
            setTimeout(() => {
                switchForm();
                document.getElementById('loginUsername').value = username;
                document.getElementById('loginPassword').value = '';
            }, 1500);
        }

        // Khởi tạo khi tải trang
        window.onload = function() {
            initDatabase();
        }
    </script>
</body>
</html>
